# =====================================================
#  Belarion Items Manager - items.yml
#  Chaque entree = un Custom Item. Ajouter un item ici suffit,
#  aucune modification de code Java n'est necessaire.
#
#  material  : Material Bukkit 1.8 utilise comme base
#              (voir https://helpch.at/docs/1.8/index.html?org/bukkit/Material.html)
#  texture   : nom du fichier PNG (sans extension), doit exister dans
#              assets/minecraft/textures/items/<texture>.png du resource pack
#  name      : nom affiche (couleurs & supportees)
#  lore      : description (liste de lignes, couleurs & supportees)
#
#  Identification : chaque item recoit automatiquement un tag NBT
#  "BelarionItemId" = <id de cette section> (ex: "emerald_hammer"). C'est ce
#  tag, et lui seul, qui identifie l'item de facon fiable (survit reparation
#  a l'enclume, enchantement, renommage, deplacement d'inventaire). Cote
#  resource pack, OptiFine CIT doit matcher sur ce tag avec
#  "nbt.BelarionItemId=<id>" -- voir le README pour le detail et les modeles
#  de fichiers .properties. Ne pas utiliser CustomModelData ni la durability
#  comme identifiant.
# =====================================================

items:
  emerald_hammer:
    material: DIAMOND_AXE
    texture: emerald_hammer
    name: "&aHammer en Émeraude"
    lore:
      - "&7Outil custom"
      - "&d✔ Custom Item"

  emerald_pickaxe:
    material: DIAMOND_PICKAXE
    texture: emerald_pickaxe
    name: "&bPioche en Émeraude"
    lore:
      - "&7Outil custom"
      - "&d✔ Custom Item"
