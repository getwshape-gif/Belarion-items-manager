# A copier dans : assets/minecraft/optifine/cit/items/emerald_hammer.properties
# Texture a copier dans : assets/minecraft/optifine/cit/emerald_hammer.png
#
# S'applique dans l'inventaire, en main, et au sol (type=item couvre les 3
# contextes automatiquement). Le modele 3D reste celui de la pioche/hache
# diamant vanilla (parent "item/handheld", non modifie) : seule la texture
# change.
#
# weight=1000 : si un joueur utilise en plus son propre Resource Pack (ex:
# pack PvP personnel) qui recolore TOUS les objets en diamant sans condition
# NBT, OptiFine doit choisir entre les deux regles qui matchent notre item
# (le nbt.BelarionItemId ne suffit pas a lui seul a "gagner" : OptiFine
# departage par weight, puis par nom de fichier). Un weight eleve garantit
# que la texture Belarion l'emporte toujours, quel que soit le pack
# personnel du joueur. Voir resourcepack-templates/README.md.

type=item
items=diamond_axe
nbt.BelarionItemId=emerald_hammer
texture=emerald_hammer
weight=1000
